<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>ป๊อกเด้ง Pokdeng Online</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+Thai:wght@400;600;800&family=Noto+Sans+KR:wght@400;600;800&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
  :root{
    --felt-deep:#052018; --felt-mid:#0a3a2a; --felt-hi:#16624a;
    --rail-dark:#1c0f08; --rail-hi:#3d2414;
    --gold:#c79a3d; --gold-bright:#f3d987; --gold-dim:#6b4e12;
    --ivory:#faf5e8; --ink:#231a12; --red-suit:#b0223a; --glow:#31e6a6;
  }
  *{box-sizing:border-box;}
  html{background:#000;}
  body{
    margin:0; min-height:100vh;
    background: radial-gradient(circle at 50% 30%, var(--felt-hi), var(--felt-mid) 45%, var(--felt-deep) 100%);
    font-family:'Noto Sans KR','Noto Sans Thai',sans-serif; color:var(--ivory);
    display:flex; flex-direction:column; align-items:center; padding:18px 10px 70px;
  }
  .frame{
    width:100%; max-width:480px; border-radius:26px; padding:20px 16px 24px;
    background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0.3) 35%), linear-gradient(135deg, var(--rail-hi), var(--rail-dark) 60%);
    box-shadow:0 24px 60px rgba(0,0,0,0.7), inset 0 0 0 2px rgba(199,154,61,0.35), inset 0 2px 0 rgba(255,255,255,0.08);
    position:relative;
  }
  .felt-inset{ position:absolute; inset:10px; border-radius:18px; background:radial-gradient(circle at 50% 20%, var(--felt-hi), var(--felt-mid) 55%, var(--felt-deep) 100%); box-shadow: inset 0 0 40px rgba(0,0,0,0.55); z-index:0; }
  .content{ position:relative; z-index:1; }

  h1{ font-family:'Bebas Neue', sans-serif; letter-spacing:7px; font-size:28px; text-align:center; margin:4px 0 0;
    background:linear-gradient(180deg, var(--gold-bright), var(--gold) 55%, var(--gold-dim)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub{ text-align:center; font-size:11px; color:var(--gold); opacity:0.65; margin-bottom:18px; letter-spacing:1.5px; text-transform:uppercase;}

  input{ width:100%; padding:13px 15px; border-radius:12px; border:1px solid rgba(199,154,61,0.4); background:rgba(0,0,0,0.3); color:var(--ivory); font-size:15px; margin-bottom:12px; }

  .table-card{
    display:flex; align-items:center; gap:12px; padding:13px 15px; border-radius:16px;
    background:linear-gradient(180deg, rgba(0,0,0,0.32), rgba(0,0,0,0.14)); border:1px solid rgba(255,255,255,0.07);
    margin-bottom:10px; cursor:pointer; transition:transform .12s, box-shadow .12s;
  }
  .table-card:hover{ transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,0.35); }
  .table-card.full{ opacity:0.45; cursor:not-allowed; }
  .table-icon{ width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px;
    background:radial-gradient(circle at 35% 30%, #2f5646, #142720); border:1px solid rgba(199,154,61,0.5); flex-shrink:0; }
  .table-info{ flex:1; }
  .table-name{ font-weight:700; font-size:14.5px; }
  .table-meta{ font-size:11.5px; opacity:0.6; margin-top:2px; }
  .table-status{ font-size:11px; padding:4px 10px; border-radius:20px; font-weight:700; }
  .status-lobby{ background:rgba(199,154,61,0.15); color:var(--gold-bright); border:1px solid rgba(199,154,61,0.4); }
  .status-playing{ background:rgba(49,230,166,0.12); color:var(--glow); border:1px solid rgba(49,230,166,0.4); }

  .row{ display:flex; gap:10px; }
  button.btn{
    font-weight:700; font-size:14px; padding:13px 22px; border-radius:30px; border:none; cursor:pointer;
    background:linear-gradient(180deg, var(--gold-bright), var(--gold) 55%, var(--gold-dim)); color:#2a1c00;
    box-shadow:0 5px 0 var(--gold-dim), 0 8px 16px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.6); flex:1;
  }
  button.btn.secondary{ background:linear-gradient(180deg,#2b4d3d,#12281e); color:var(--ivory); box-shadow:0 5px 0 #0a1a13; }
  button.btn:active{ transform:translateY(3px); box-shadow:none; }
  button.btn:disabled{ opacity:0.35; cursor:not-allowed; }

  .players-list{ margin:14px 0; }
  .player-row{
    display:flex; align-items:center; gap:10px; padding:11px 13px; border-radius:14px;
    background:linear-gradient(180deg, rgba(0,0,0,0.32), rgba(0,0,0,0.14)); margin-bottom:8px; border:1px solid rgba(255,255,255,0.06);
    transition: box-shadow .25s;
  }
  .player-row.active-turn{ box-shadow:0 0 0 2px var(--glow), 0 0 16px rgba(49,230,166,0.4); }
  .player-row .tag{ font-size:10.5px; background:rgba(199,154,61,0.14); border:1px solid rgba(199,154,61,0.4); padding:3px 10px; border-radius:20px; color:var(--gold-bright); font-weight:600; }
  .player-row .bal{ margin-left:auto; font-weight:700; color:var(--gold-bright); font-size:13px; }
  .avatar-sm{ width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px;
    background:radial-gradient(circle at 35% 30%, #2f5646, #142720); border:1px solid rgba(199,154,61,0.5); flex-shrink:0; }

  .cards-row{ display:flex; gap:9px; min-height:78px; align-items:center; flex-wrap:wrap; margin:6px 0 4px; }
  .card{ width:52px; height:74px; border-radius:9px; background:linear-gradient(160deg,#fff, var(--ivory) 65%);
    box-shadow:0 6px 14px rgba(0,0,0,0.45); opacity:0; animation:deal .4s ease forwards; position:relative; }
  .card-corner{ position:absolute; top:5px; left:5px; text-align:center; line-height:1; font-weight:800; color:var(--ink); font-size:11.5px; }
  .card-corner .s{ font-size:10.5px; display:block; margin-top:1px; }
  .card.red .card-corner{ color:var(--red-suit); }
  .card-center{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:26px; color:var(--ink); opacity:0.9; }
  .card.red .card-center{ color:var(--red-suit); }
  .card.back{ background:repeating-linear-gradient(45deg, #7a3d1c 0 6px, #5c2c12 6px 12px); border:2px solid var(--gold); }
  .card.back::after{ content:"◆"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--gold-bright); font-size:17px; opacity:0.85; }
  @keyframes deal{ from{opacity:0; transform:translateY(-18px) scale(0.8);} to{opacity:1; transform:translateY(0) scale(1);} }

  .center-msg{ text-align:center; font-weight:700; font-size:14.5px; margin:12px 0; min-height:22px; }
  .bet-row{ display:flex; justify-content:center; gap:12px; margin:10px 0 16px; flex-wrap:wrap; }
  .chip-stack{ position:relative; width:54px; height:54px; cursor:pointer; transition:transform .15s; }
  .chip-stack:hover{ transform:translateY(-3px); }
  .chip{ position:absolute; inset:0; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:12px; color:#1a1a1a; border:2px solid rgba(255,255,255,0.55); outline:3px dotted rgba(255,255,255,0.35); outline-offset:-6px; }
  .chip-edge{ position:absolute; left:0; right:0; bottom:-4px; height:9px; border-radius:50%; opacity:0.9; z-index:-1; }
  .c10 .chip{ background:radial-gradient(circle at 35% 30%, #fdfdfd, #cfcfcf);} .c10 .chip-edge{ background:#9c9c9c; }
  .c50 .chip{ background:radial-gradient(circle at 35% 30%, #f0b876, #c9791f); color:#3a2200;} .c50 .chip-edge{ background:#8a4f14; }
  .c100 .chip{ background:radial-gradient(circle at 35% 30%, #7fb8f2, #2f6fb0); color:#fff;} .c100 .chip-edge{ background:#1f4c78; }

  .hidden{ display:none !important; }
  .note{ font-size:11px; opacity:0.55; text-align:center; margin-top:14px; line-height:1.7; }
  .countdown{ text-align:center; font-size:12px; color:var(--gold-bright); opacity:0.8; margin-bottom:6px; }
  .back-link{ font-size:12px; opacity:0.6; cursor:pointer; margin-bottom:10px; display:inline-block; }
</style>
</head>
<body>
<div class="frame">
  <div class="felt-inset"></div>
  <div class="content">
    <h1>POKDENG ONLINE</h1>
    <div class="sub">ป๊อกเด้ง · 실시간 멀티플레이어</div>

    <!-- 화면 1: 닉네임 -->
    <div id="screen-name">
      <input id="nameInput" placeholder="닉네임 입력" maxlength="12">
      <button class="btn" id="nameConfirmBtn">입장하기</button>
    </div>

    <!-- 화면 2: 공개 테이블 목록 -->
    <div id="screen-lobby" class="hidden">
      <div id="tablesList"></div>
      <div class="note">테이블을 선택하면 바로 입장돼요. 2명 이상 모이면 잠시 후 자동으로 라운드가 시작됩니다.</div>
    </div>

    <!-- 화면 3: 게임 -->
    <div id="screen-game" class="hidden">
      <span class="back-link" id="leaveBtn">← 테이블 목록으로</span>
      <div class="countdown hidden" id="countdownMsg"></div>
      <div class="players-list" id="playersList"></div>
      <div class="cards-row" id="myCards"></div>
      <div class="center-msg" id="gameMsg">대기 중...</div>
      <div class="bet-row hidden" id="betRow">
        <div class="chip-stack c10" data-v="10"><div class="chip-edge"></div><div class="chip">10</div></div>
        <div class="chip-stack c50" data-v="50"><div class="chip-edge"></div><div class="chip">50</div></div>
        <div class="chip-stack c100" data-v="100"><div class="chip-edge"></div><div class="chip">100</div></div>
      </div>
      <div class="row" id="actionRow">
        <button class="btn hidden" id="hitBtn">3번째 카드</button>
        <button class="btn secondary hidden" id="stayBtn">스테이</button>
      </div>
      <div class="note">뱅커(딜러)는 매 라운드마다 다음 사람으로 자동 교체됩니다.</div>
    </div>
  </div>
</div>

<script>
const socket = io();
let myId = null;
let myName = '';
let currentBet = 0;

socket.on('connect', ()=> myId = socket.id);

document.getElementById('nameConfirmBtn').onclick = ()=>{
  myName = document.getElementById('nameInput').value.trim() || '플레이어';
  document.getElementById('screen-name').classList.add('hidden');
  document.getElementById('screen-lobby').classList.remove('hidden');
  socket.emit('getLobby');
};

document.getElementById('leaveBtn').onclick = ()=>{
  socket.emit('leaveTable');
  document.getElementById('screen-game').classList.add('hidden');
  document.getElementById('screen-lobby').classList.remove('hidden');
  socket.emit('getLobby');
};

document.getElementById('hitBtn').onclick = ()=> socket.emit('decision', {action:'hit'});
document.getElementById('stayBtn').onclick = ()=> socket.emit('decision', {action:'stay'});
document.querySelectorAll('.chip-stack').forEach(chip=>{
  chip.onclick = ()=>{
    currentBet += parseInt(chip.dataset.v);
    socket.emit('placeBet', { amount: currentBet });
  };
});
socket.on('errorMsg', (msg)=> alert(msg));

socket.on('lobbyUpdate', (tables)=>{
  const listEl = document.getElementById('tablesList');
  if(document.getElementById('screen-lobby').classList.contains('hidden')) return;
  listEl.innerHTML = '';
  tables.forEach(t=>{
    const full = t.playerCount >= t.maxPlayers;
    const playing = t.phase !== 'lobby';
    const row = document.createElement('div');
    row.className = 'table-card' + (full ? ' full' : '');
    row.innerHTML = `
      <div class="table-icon">🃏</div>
      <div class="table-info">
        <div class="table-name">${t.name}</div>
        <div class="table-meta">최소 베팅 ${t.minBet} 칩 · ${t.playerCount}/${t.maxPlayers}명</div>
      </div>
      <div class="table-status ${playing ? 'status-playing' : 'status-lobby'}">${playing ? '진행중' : '대기중'}</div>
    `;
    if(!full){
      row.onclick = ()=>{
        socket.emit('joinTable', { tableId: t.id, name: myName });
        document.getElementById('screen-lobby').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
      };
    }
    listEl.appendChild(row);
  });
});

function cardEl(card){
  const d = document.createElement('div');
  if(card===null || card===undefined){ d.className='card back'; return d; }
  const isRed = card.s==='♥' || card.s==='♦';
  d.className = 'card' + (isRed?' red':'');
  d.innerHTML = `<div class="card-corner">${card.r}<span class="s">${card.s}</span></div><div class="card-center">${card.s}</div>`;
  return d;
}

let countdownInterval = null;

socket.on('tableUpdate', (t)=>{
  document.getElementById('screen-lobby').classList.add('hidden');
  document.getElementById('screen-game').classList.remove('hidden');

  const me = t.players.find(p=>p.id===myId);

  const list = document.getElementById('playersList');
  list.innerHTML = '';
  t.players.forEach(p=>{
    const row = document.createElement('div');
    row.className = 'player-row' + (t.turnPlayerId===p.id ? ' active-turn' : '');
    row.innerHTML = `
      <div class="avatar-sm">${p.isBanker ? '👑' : '🧑'}</div>
      <span>${p.name}${p.id===myId?' (나)':''}</span>
      <span class="tag">${p.isBanker ? '뱅커' : (t.phase==='betting' ? (p.bet>0?`베팅 ${p.bet}`:'베팅 대기'):(p.handName||''))}</span>
      <span class="bal">🪙${p.balance.toLocaleString()}</span>
    `;
    list.appendChild(row);
  });

  const myCardsEl = document.getElementById('myCards');
  myCardsEl.innerHTML = '';
  if(me && me.hand.length) me.hand.forEach(c => myCardsEl.appendChild(cardEl(c)));

  const betRow = document.getElementById('betRow');
  const hitBtn = document.getElementById('hitBtn');
  const stayBtn = document.getElementById('stayBtn');
  const msg = document.getElementById('gameMsg');
  const countdownEl = document.getElementById('countdownMsg');

  betRow.classList.add('hidden');
  hitBtn.classList.add('hidden');
  stayBtn.classList.add('hidden');
  countdownEl.classList.add('hidden');
  if(countdownInterval) clearInterval(countdownInterval);

  if(t.phase === 'lobby'){
    if(t.countdownEndsAt){
      countdownEl.classList.remove('hidden');
      countdownInterval = setInterval(()=>{
        const secs = Math.max(0, Math.ceil((t.countdownEndsAt - Date.now())/1000));
        countdownEl.textContent = `${secs}초 후 라운드 시작...`;
        if(secs<=0) clearInterval(countdownInterval);
      }, 250);
      msg.textContent = '플레이어 모집 완료 — 곧 시작합니다';
    } else {
      msg.textContent = '다른 플레이어를 기다리는 중... (2명 이상 필요)';
    }
  } else if(t.phase === 'betting'){
    if(me && !me.isBanker){
      msg.textContent = me.bet>0 ? `베팅 완료: ${me.bet} 칩 (다른 플레이어 대기 중)` : `베팅할 칩을 선택하세요 (최소 ${t.minBet})`;
      if(me.bet===0){ betRow.classList.remove('hidden'); currentBet=0; }
    } else {
      msg.textContent = '플레이어들이 베팅 중입니다 (뱅커는 베팅하지 않음)';
    }
  } else if(t.phase === 'turns'){
    if(t.turnPlayerId === myId){
      msg.textContent = '당신의 차례입니다 — 3번째 카드를 받으시겠습니까?';
      hitBtn.classList.remove('hidden');
      stayBtn.classList.remove('hidden');
    } else {
      const turnP = t.players.find(p=>p.id===t.turnPlayerId);
      msg.textContent = turnP ? `${turnP.name}님의 차례...` : '카드 정산 중...';
    }
  } else if(t.phase === 'resolved'){
    msg.textContent = me ? `${me.handName || ''} — ${me.result || ''}` : '라운드 종료';
  }
});
</script>
</body>
</html>
